<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>PopQuiz – kvíz o popkultuře</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0f0f1a" />

  <!-- Mobile web app (Android + nový standard) -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS specifika -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PopQuiz" />

  <!-- Favicon + iOS home screen icon -->
  <link rel="icon" type="image/png" href="./icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">

    <!-- HOME -->
    <section id="screen-home" class="screen active">
      <div class="hero">
        <h1>🎬 PopQuiz</h1>
        <p class="subtitle">Filmy · hudba · seriály · hry · anime · knihy</p>
      </div>

      <div class="mode-cards">
        <button class="mode-card" data-mode="solo">
          <span class="emoji">🧠</span>
          <h2>Sólo režim</h2>
          <p>Hraj sám, časovač, série bonusů</p>
        </button>

        <button class="mode-card" data-mode="moderator">
          <span class="emoji">🎤</span>
          <h2>Moderátor</h2>
          <p>Čteš otázky ostatním, nápovědy na vyžádání</p>
        </button>

        <button class="mode-card" data-mode="teams">
          <span class="emoji">👥</span>
          <h2>Týmový mód</h2>
          <p>Týmy proti sobě, moderátor řídí hru</p>
        </button>
      </div>

      <div class="footer-stats" id="footer-stats"></div>
    </section>

    <!-- NASTAVENÍ TÝMŮ -->
    <section id="screen-teams-setup" class="screen">
      <button class="ghost-btn back" data-go="screen-home">← Zpět</button>
      <h2>Nastavení týmů</h2>
      <p class="subtitle">Přidej 2–6 týmů a pojmenuj je</p>

      <div id="teams-editor" class="teams-editor"></div>

      <button id="btn-add-team" class="ghost-btn">+ Přidat tým</button>
      <button id="btn-start-teams" class="primary-btn full">Spustit hru</button>
    </section>

    <!-- HRA -->
    <section id="screen-game" class="screen">
      <header class="game-header">
        <button class="ghost-btn back" data-go="screen-home">←</button>

        <div class="progress">
          <span id="progress-text">1 / 30</span>
          <div class="progress-bar">
            <div id="progress-fill"></div>
          </div>
        </div>

        <div id="timer-badge" class="timer-badge hidden">
          ⏱ <span id="timer-text">15</span>s
        </div>

        <div id="score-badge" class="score-badge">0</div>
      </header>

      <main class="question-area">
        <div class="meta-row">
          <span class="category-chip" id="category-chip">Film</span>
          <span class="difficulty-chip" id="difficulty-chip">●●●</span>
        </div>

        <h2 id="question-text">Otázka…</h2>

        <!-- SÓLO -->
        <div id="answers" class="answers hidden"></div>
        <div id="solo-feedback" class="solo-feedback hidden"></div>

        <!-- MODERÁTOR / TÝMY -->
        <div id="moderator-panel" class="moderator-panel hidden">
          <div class="correct-answer">
            <span class="label">Správná odpověď:</span>
            <span id="correct-answer-text" class="blurred">●●●●●●●</span>
            <button id="btn-reveal" class="ghost-btn">Odhalit</button>
          </div>

          <div class="hints">
            <h3>💡 Nápovědy</h3>
            <div id="hints-list"></div>
          </div>

          <div id="teams-scoring" class="teams-scoring hidden">
            <h3>Kdo uhodl?</h3>
            <div id="teams-buttons"></div>
          </div>

          <div class="mod-controls">
            <button id="btn-skip" class="ghost-btn">Přeskočit</button>
            <button id="btn-next-mod" class="primary-btn">Další otázka →</button>
          </div>
        </div>
      </main>

      <aside id="teams-scoreboard" class="teams-scoreboard hidden"></aside>
    </section>

    <!-- VÝSLEDEK -->
    <section id="screen-result" class="screen">
      <div class="result-card">
        <h1 id="result-title">Hotovo! 🎉</h1>
        <div id="result-body"></div>

        <button id="btn-restart" class="primary-btn full">Hrát znovu</button>
        <button class="ghost-btn full" data-go="screen-home">Hlavní menu</button>
      </div>
    </section>

    <!-- NASTAVENÍ (plovoucí tlačítko) -->
    <button id="settings-toggle" class="fab">⚙️</button>

    <div id="settings-panel" class="settings-panel hidden">
      <h3>Nastavení</h3>

      <label class="switch">
        <input type="checkbox" id="opt-sound" checked />
        🔊 Zvuky
      </label>

      <label class="switch">
        <input type="checkbox" id="opt-timer" checked />
        ⏱ Časovač v sólo (15 s)
      </label>

      <label class="switch">
        Otázek na hru:
        <select id="opt-count">
          <option>10</option>
          <option selected>30</option>
          <option>50</option>
        </select>
      </label>

      <button id="btn-reset-pool" class="ghost-btn">🔄 Reset paměti otázek</button>
    </div>
  </div>

  <!-- JS -->
  <script src="./app.js"></script>
</body>
</html>
