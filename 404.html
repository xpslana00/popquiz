<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PopQuiz - Presmerovani</title>
  <meta name="robots" content="noindex" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0a101d 0%, #0f162c 50%, #11182f 100%);
      color: #f8fbff;
    }

    .card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: rgba(8, 16, 34, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      color: #b9c7dc;
      line-height: 1.6;
    }

    a {
      color: #40c4ff;
    }
  </style>
  <script>
    (function () {
      var path = window.location.pathname || '/';
      var normalized = path.replace(/\/+$/, '') || '/';
      var isQuizPath = normalized === '/app' || normalized.indexOf('/app/') === 0;
      var targetPath = isQuizPath ? '/app/' : '/';
      var target = window.location.origin + targetPath + window.location.search + window.location.hash;

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <main class="card">
    <h1>Presmerovavam na PopQuiz</h1>
    <p>Neplatna adresa byla presmerovana na uvodni stranu nebo do kvízu.</p>
    <p><a href="/">Pokracovat rucne</a></p>
  </main>
</body>
</html>
